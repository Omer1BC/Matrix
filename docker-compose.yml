services: 

  backend:
    build:
      context: backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # volumes:
    #   - ./backend:/app
    #   - ./Animations:/Animations
    command: >
      sh -c "
        python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env

  frontend:
    build:
      context: frontend
    ports:
      - "3000:3000"
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    #   - /app/.next
    command: npm run dev
    environment:
      - WATCHPACK_POLLING=true
    env_file:
      - .env    


